services:
  api:
    restart: always
    build: .
    container_name: lazarini_api
    ports: ["8021:8080"]
  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/97035240"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

